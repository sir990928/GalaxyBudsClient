name: Compile Android APK

on:
  push:
    branches: [ master, NET10 ]
  pull_request:
    branches: [ master ]
  release:
     types: 
       - published
       - prereleased
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      MSBUILDSINGLEPROCESS: true
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
       
    - name: Install Android Workload
      run: dotnet workload install android

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 密钥恢复，不需要签名功能直接删除整个区块
    - name: Restore Keystore
      env:
        KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_B64" | base64 -d > app.keystore

    - name: Restore dependencies
      run: |
        dotnet restore \
        --configfile GalaxyBudsClient/nuget.config \
        GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj
        
    - name: Publish Android APK
      env:
        KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        KEY_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        dotnet publish GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj \
        -c Release \
        -f net10.0-android36.1 \
        -p:AndroidPackageFormats=apk \
        -p:AndroidCreatePackage=true \
        -p:AndroidBundle=false \
        -p:AndroidSupportedAbis=arm64-v8a \
        -p:StripNativeSymbols=true \
        -p:AndroidEnableDynamicLoading=false \
        -p:DebugSymbols=false \
        -p:DebugType=None \
        -p:PublishTrimmed=true \
        -p:TrimMode=full \
        -p:AndroidSdkDirectory=$ANDROID_HOME \
        -p:AndroidSigningKeyStore=app.keystore \
        -p:AndroidSigningKeyAlias=$KEY_ALIAS \
        -p:AndroidSigningKeyPass=$KEY_PASS \
        -p:AndroidSigningStorePass=$KEY_STORE_PASS \
        -o ./build_output \
        --no-restore \
        -maxcpucount:1

    - name: List all build files (Debug)
      run: find ./build_output

    - name: Rename APK（优先选取Signed签名包）
      run: |
        APK_PATH=$(find ./build_output -maxdepth 3 -name "*-Signed.apk" | head -n 1)
        if [ -z "$APK_PATH" ]; then
          APK_PATH=$(find ./build_output -maxdepth 3 -name "*.apk" | head -n 1)
        fi
        if [ -z "$APK_PATH" ]; then
          echo "::error::未找到APK文件！"
          exit 1
        fi
        mv "$APK_PATH" GalaxyBudsClient_Android_Universal_Signed.apk

    # 额外资源无损压缩：图片 + ZIP最高等级压缩
    - name: Optimize APK Assets
      run: |
        sudo apt update && sudo apt install optipng -y
        mkdir apktmp
        unzip -q GalaxyBudsClient_Android_Universal_Signed.apk -d apktmp
        find apktmp/res -type f -iname "*.png" -exec optipng -o2 -quiet {} \;
        cd apktmp
        zip -r -9 -q ../optimized.apk .
        cd ..
        mv optimized.apk GalaxyBudsClient_Android_Universal_Signed.apk

    - name: Upload APK to Release
      if: github.event_name == 'release'
      uses: AButler/upload-release-assets@v3.0.1
      with:
        files: 'GalaxyBudsClient_Android_Universal_Signed.apk'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Debug Artifact
      uses: actions/upload-artifact@v6
      with:
        name: APK_Debug
        path: GalaxyBudsClient_Android_Universal_Signed.apk
