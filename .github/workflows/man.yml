name: Compile GalaxyBudsClient Android

on:
  push:
    branches: [ master, NET10 ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache dotnet workload
        uses: actions/cache@v4
        with:
          path: |
            ~/.dotnet/packs
            ~/.dotnet/workloadPacks
          key: dotnet-android-workload-${{ runner.os }}

      - name: Install Android Workload
        run: dotnet workload install android

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/NuGet/Cache
          key: nuget-${{ hashFiles('**/nuget.config','**/*.csproj') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖工具 llvm、zip、unzip
        run: sudo apt update && sudo apt install -y llvm zip unzip

      - name: 清理旧构建产物
        run: |
          dotnet clean GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj -c Release
          rm -rf ./build_output
          mkdir -p ./build_output
          find . -type d -name "bin" -exec rm -rf {} +
          find . -type d -name "obj" -exec rm -rf {} +

      - name: Restore项目依赖
        run: |
          dotnet restore \
          --configfile GalaxyBudsClient/nuget.config \
          GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj

      - name: Publish（关闭.NET自动签名）
        run: |
          dotnet publish GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj \
          -c Release \
          -f net10.0-android36.1 \
          -r android-arm64 \
          -maxcpucount:1 \
          -p:AndroidPackageFormats=apk \
          -p:AndroidCreatePackage=true \
          -p:PublishTrimmed=false \
          -p:RunAOTCompilation=false \
          -p:DebugSymbols=false \
          -p:DebugType=None \
          -p:AndroidEnableProfiledAot=false \
          -p:AndroidSignPackage=false \
          -o ./build_output \
          --no-restore

      - name: 裁剪ABI + SO瘦身（已修复输出路径）
        run: |
          mkdir -p work_apk
          RAW_APK=$(find ./build_output -maxdepth 1 -type f -name "*.apk" | head -1)
          unzip -q "$RAW_APK" -d work_apk

          # 删除多余架构文件夹
          rm -rf work_apk/lib/armeabi-v7a
          rm -rf work_apk/lib/x86
          rm -rf work_apk/lib/x86_64

          # 剥离so调试符号
          find work_apk/lib/arm64-v8a -name "*.so" -exec llvm-strip --strip-all {} \;

          cd work_apk
          # APK直接输出至 build_output，和上传路径保持一致
          zip -q -r ../build_output/GalaxyBudsClient-arm64-unsigned.apk .
          cd ..

          rm -rf work_apk
          rm "$RAW_APK"
          ls -la ./build_output/

      - name: 上传【未签名精简包】
        uses: actions/upload-artifact@v6
        with:
          name: GalaxyBudsClient_unsigned_arm64
          path: ./build_output/GalaxyBudsClient-arm64-unsigned.apk
