name: Compile Android APK

on:
  push:
    branches: [ master, NET10 ]
  pull_request:
    branches: [ master ]
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # 缓存workload加速
      - name: Cache dotnet workload
        uses: actions/cache@v4
        with:
          path: |
            ~/.dotnet/packs
            ~/.dotnet/workloadPacks
          key: dotnet-android-workload-${{ runner.os }}

      - name: Install Android Workload
        run: dotnet workload install android

      # 缓存NuGet包
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/NuGet/Cache
          key: nuget-${{ hashFiles('**/nuget.config','**/*.csproj') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install llvm-strip（用于清理so符号）
        run: sudo apt update && sudo apt install -y llvm

      - name: 彻底清理全部编译缓存，避免文件占用冲突
        run: |
          dotnet clean GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj -c Release
          rm -rf ./build_output
          find . -type d -name "bin" -exec rm -rf {} +
          find . -type d -name "obj" -exec rm -rf {} +

      - name: Restore dependencies
        run: |
          dotnet restore \
          --configfile GalaxyBudsClient/nuget.config \
          GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj

      - name: Publish Android APK arm64-only，关闭全部调试信息
        run: |
          dotnet publish GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj \
          -c Release \
          -f net10.0-android36.1 \
          -maxcpucount:1 \
          -p:AndroidPackageFormats=apk \
          -p:AndroidCreatePackage=true \
          -p:RuntimeIdentifier=android-arm64 \
          -p:AndroidSupportedAbis=arm64-v8a \
          -p:PublishTrimmed=false \
          -p:RunAOTCompilation=false \
          -p:ILLinkTreatWarningsAsErrors=false \
          -p:DebugSymbols=false \
          -p:DebugType=None \
          -p:AndroidEnableProfiledAot=false \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          -o ./build_output \
          --no-restore

      - name: Extract APK，清理so调试符号（核心瘦身步骤）
        run: |
          mkdir -p work_apk
          APK=$(find ./build_output -name "*-Signed.apk" | head -1)
          unzip -q "$APK" -d work_apk
          find work_apk/lib/arm64-v8a -name "*.so" -exec llvm-strip --strip-all {} \;
          cd work_apk
          zip -q -r ../slim.apk .
          cd ..
          mv slim.apk "$APK"
          rm -rf work_apk
          # 使用标准find语法，修复shell语法报错
          find ./build_output -maxdepth 1 -type f -name "*.apk" ! -name "*-Signed.apk" -delete

      - name: Upload APK artifact（仅上传已签名包）
        uses: actions/upload-artifact@v6
        with:
          name: GalaxyBudsClient_Android_APK
          path: ./build_output/*-Signed.apk

  attach-to-release:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'release'
    steps:
      - name: Download Android APK artifact
        uses: actions/download-artifact@v7
        with:
          name: GalaxyBudsClient_Android_APK

      - name: Rename APK
        run: |
          mv ./*-Signed.apk GalaxyBudsClient_Android_arm64_slim.apk

      - uses: AButler/upload-release-assets@v3.0.1
        with:
          files: '*.apk'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
